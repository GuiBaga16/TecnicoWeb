<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Input</title>
  </head>
  <body>
    <div class="container">

      <label for="nome">Nome</label>
      <input id="nome" type="text" placeholder="Digite seu nome" />
      <button id="salvar">Salvar</button>
      <p id="texto"></p>
      <hr />
      <label for="">Contador</label>

      <p id="numero">0</p>
      <button id="menos">-</button>
      <button id="mais">+</button>

      <hr />
      <label for="">Calculadora</label>

      <input id="numero1" type="number" placeholder="Digite um numero" />
      <input id="numero2" type="number" placeholder="Digite outro numero" />
      <p id="resultado">0</p>

      <button id="btnMenos">-</button>
      <button id="btnMais">+</button>
      <button id="btnMultiplicacao">*</button>
      <button id="btnDivisao">/</button>

      <hr>

      <label for="">Lista</label>
      <input id="algo" type="text" placeholder="Digite algo"/>
      <button id="adicionar">Adicionar</button>
      <ul id="itens">

      </ul>

    </div>
    <script src="./script.js"></script>
  </body>
</html>
